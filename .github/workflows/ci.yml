name: CI

on:
  push:
    branches: [main, "feature/**", "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts already falls back to a local placeholder URL, but we
      # set one explicitly here so CI behavior doesn't silently depend on that
      # fallback surviving future refactors. `prisma generate` never connects.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      OMNIAGENT_STORAGE_DRIVER: file
      OMNIAGENT_MODEL_PROVIDER: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm test
      - run: npm run build
